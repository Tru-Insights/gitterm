syntax = "proto3";

package gitterm.agent.v1;

service GitTermAgent {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);
  rpc ReadFile(ReadFileRequest) returns (stream ReadFileChunk);
  rpc GitStatus(GitStatusRequest) returns (GitStatusResponse);
  rpc GitDiff(GitDiffRequest) returns (GitDiffResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc StartSession(StartSessionRequest) returns (Session);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc AttachTerminal(stream TerminalInput) returns (stream TerminalOutput);
  // Chats index (TRU-78): the agent scans its own harness transcript
  // stores (claude/codex/pi) with the same code the desktop uses locally.
  rpc ListChats(ListChatsRequest) returns (ListChatsResponse);
  rpc ChatPreview(ChatPreviewRequest) returns (ChatPreviewResponse);
}

message HandshakeRequest {
  string client_name = 1;
  string client_version = 2;
  uint32 protocol_version = 3;
}

message HandshakeResponse {
  string agent_name = 1;
  string agent_version = 2;
  uint32 protocol_version = 3;
  repeated string capabilities = 4;
}

message ListDirRequest {
  string workspace_id = 1;
  string root = 2;
  string current_dir = 3;
  bool show_hidden = 4;
}

message ListDirResponse {
  string workspace_id = 1;
  string root = 2;
  string current_dir = 3;
  repeated DirEntry entries = 4;
}

message DirEntry {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
}

message ReadFileRequest {
  string workspace_id = 1;
  string root = 2;
  string path = 3;
  // Stop streaming after this many bytes; 0 means the agent default cap.
  uint64 max_bytes = 4;
}

message ReadFileChunk {
  bytes data = 1;
  // Full size of the file on disk, independent of max_bytes.
  uint64 total_size = 2;
  // True when the stream stops before total_size due to max_bytes.
  bool truncated = 3;
}

message GitStatusRequest {
  string workspace_id = 1;
  string root = 2;
}

message GitStatusResponse {
  string workspace_id = 1;
  // Canonical repo root actually used (self-healed to the toplevel).
  string root = 2;
  bool is_git_repo = 3;
  string repo_name = 4;
  string branch_name = 5;
  repeated GitFileStatus staged = 6;
  repeated GitFileStatus unstaged = 7;
  repeated GitFileStatus untracked = 8;
}

message GitFileStatus {
  // Repo-relative path.
  string path = 1;
  // Single-letter porcelain status: A/M/D/R/?.
  string status = 2;
  bool is_staged = 3;
}

message GitDiffRequest {
  string workspace_id = 1;
  string root = 2;
  // Repo-relative path from GitStatusResponse; absolute or parent-escaping
  // paths are rejected.
  string file_path = 3;
  bool staged = 4;
}

message GitDiffResponse {
  string workspace_id = 1;
  string file_path = 2;
  bool staged = 3;
  repeated GitDiffLine lines = 4;
}

enum GitDiffLineKind {
  GIT_DIFF_LINE_KIND_UNSPECIFIED = 0;
  GIT_DIFF_LINE_KIND_CONTEXT = 1;
  GIT_DIFF_LINE_KIND_ADDITION = 2;
  GIT_DIFF_LINE_KIND_DELETION = 3;
  GIT_DIFF_LINE_KIND_HEADER = 4;
}

message GitDiffLine {
  string content = 1;
  GitDiffLineKind kind = 2;
  // 1-based; 0 means the line doesn't exist on that side.
  uint32 old_line = 3;
  uint32 new_line = 4;
}

message ListSessionsRequest {
  string workspace_id = 1;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message Session {
  // Opaque stable id assigned by the agent.
  string session_id = 1;
  string workspace_id = 2;
  // shell | claude | codex | pi | custom — a label, not behavior.
  string kind = 3;
  string command = 4;
  string cwd = 5;
  bool running = 6;
  int32 exit_code = 7;
  uint64 created_unix_secs = 8;
}

message StartSessionRequest {
  string workspace_id = 1;
  // Working directory; must resolve under the agent's filesystem like any
  // other path (absolute, existing directory).
  string cwd = 2;
  string kind = 3;
  // argv; argv[0] is the program. Never shell-interpolated.
  repeated string command = 4;
  repeated EnvVar env = 5;
  uint32 cols = 6;
  uint32 rows = 7;
}

message EnvVar {
  string name = 1;
  string value = 2;
}

message StopSessionRequest {
  string session_id = 1;
}

message StopSessionResponse {
  bool stopped = 1;
}

message TerminalInput {
  oneof input {
    AttachRequest attach = 1;
    bytes data = 2;
    Resize resize = 3;
  }
}

message AttachRequest {
  string session_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message Resize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message TerminalOutput {
  oneof output {
    bytes data = 1;
    SessionExited exited = 2;
  }
}

message SessionExited {
  int32 exit_code = 1;
}

message ListChatsRequest {}

message ChatEntry {
  string id = 1;
  // "claude" | "codex" | "pi"
  string backend = 2;
  // Transcript path on the agent's machine (opaque to the desktop).
  string path = 3;
  string cwd = 4;
  // Empty when unknown (dead cwd / not a git repo).
  string repo_root = 5;
  bool is_worktree = 6;
  // Empty when unknown.
  string branch = 7;
  string title = 8;
  int64 mtime_unix_secs = 9;
  uint64 size_bytes = 10;
  bool dead_cwd = 11;
}

message ListChatsResponse {
  repeated ChatEntry chats = 1;
}

message ChatPreviewRequest {
  // Path previously returned by ListChats; must stay under the agent
  // user's home directory.
  string path = 1;
  string backend = 2;
}

message ChatPreviewMessage {
  bool is_user = 1;
  string text = 2;
}

message ChatPreviewResponse {
  repeated ChatPreviewMessage messages = 1;
  optional uint64 message_count = 2;
}
